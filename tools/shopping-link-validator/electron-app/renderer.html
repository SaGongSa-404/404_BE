<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coupang Prototype</title>
    <link rel="stylesheet" href="./renderer.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel intro">
        <p class="eyebrow">Coupang App Prototype</p>
        <h1>쿠팡 링크를 앱이 직접 열고 가격과 이미지를 추출합니다.</h1>
        <p class="subcopy">
          사용자는 링크만 입력하고, 앱은 숨겨진 브라우저 창에서 페이지를 열어
          추출을 시도합니다.
        </p>
      </section>

      <section class="panel controls">
        <label for="urlInput">쿠팡 상품 링크</label>
        <input
          id="urlInput"
          type="url"
          value="https://www.coupang.com/vp/products/9280434878"
          placeholder="https://www.coupang.com/vp/products/..."
        />
        <button id="extractButton">추출 실행</button>
        <p id="statusText">실행 전입니다.</p>
      </section>

      <section id="resultPanel" class="panel result hidden">
        <div class="hero-image-wrap">
          <img id="heroImage" alt="" />
        </div>
        <dl class="grid">
          <div>
            <dt>HTTP 상태</dt>
            <dd id="statusValue">-</dd>
          </div>
          <div>
            <dt>최종 URL</dt>
            <dd id="finalUrlValue">-</dd>
          </div>
          <div>
            <dt>제목</dt>
            <dd id="titleValue">-</dd>
          </div>
          <div>
            <dt>가격</dt>
            <dd id="priceValue">-</dd>
          </div>
          <div>
            <dt>대표 이미지</dt>
            <dd id="imageValue">-</dd>
          </div>
          <div>
            <dt>스크린샷</dt>
            <dd id="screenshotValue">-</dd>
          </div>
        </dl>
        <pre id="jsonOutput"></pre>
      </section>
    </main>

    <script src="./renderer.js" type="module"></script>
  </body>
</html>
