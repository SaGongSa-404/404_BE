spring:
  application:
    name: 404_backend

  datasource:
    url: jdbc:h2:mem:wigul
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false

  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
          kakao:
            provider: kakao
            client-id: ${KAKAO_CLIENT_ID:dev-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dev-kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
          naver:
            provider: naver
            client-id: ${NAVER_CLIENT_ID:dev-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:dev-naver-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  upload:
    dir: ./uploads

server:
  port: 8080
