spring:
  application:
    name: wigul-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/404_be}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id-required}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret-required}
            scope:
              - profile
              - email
          kakao:
            provider: kakao
            client-name: Kakao
            client-id: ${KAKAO_CLIENT_ID:kakao-client-id-required}
            client-secret: ${KAKAO_CLIENT_SECRET:kakao-client-secret-required}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image

server:
  servlet:
    session:
      cookie:
        same-site: lax

app:
  auth:
    issuer: 404-backend
    jwt-secret: ${APP_JWT_SECRET:local-development-jwt-secret-change-me}
    access-token-ttl: ${APP_ACCESS_TOKEN_TTL:PT2H}
    refresh-token-ttl: ${APP_REFRESH_TOKEN_TTL:P30D}
    allowed-redirect-uri-prefixes: ${APP_ALLOWED_REDIRECT_URI_PREFIXES:sagongsa404://auth/callback,http://localhost,http://127.0.0.1,https://localhost,https://127.0.0.1}
  shopping:
    import:
      browser-fetch:
        enabled: ${SHOPPING_IMPORT_BROWSER_FETCH_ENABLED:false}
        timeout: ${SHOPPING_IMPORT_BROWSER_FETCH_TIMEOUT:PT30S}
        render-wait: ${SHOPPING_IMPORT_BROWSER_RENDER_WAIT:PT5S}
        network-idle-timeout: ${SHOPPING_IMPORT_BROWSER_NETWORK_IDLE_TIMEOUT:PT2S}
