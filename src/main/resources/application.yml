spring:
  application:
    name: 404_backend

  datasource:
    url: jdbc:h2:mem:wigul
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false

  security:
    oauth2:
      client:
        registration: {}

server:
  port: 8081
