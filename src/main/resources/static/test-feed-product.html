<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>피드 상품 섹션 테스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #111; color: #eee; padding: 24px; max-width: 720px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
    h2 { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .section { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #444; color: #aaa; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .row label { font-size: 13px; color: #888; width: 90px; flex-shrink: 0; }
    .row input { flex: 1; padding: 8px 10px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; font-size: 13px; }
    .log { background: #0a0a0a; border-radius: 8px; padding: 10px 12px; font-size: 12px; font-family: monospace; color: #0f0; min-height: 32px; max-height: 80px; overflow-y: auto; white-space: pre-wrap; margin-top: 8px; }
    .log.err { color: #e74c3c; }

    /* 유저 카드 */
    .users { display: flex; gap: 10px; flex-wrap: wrap; }
    .user-card { background: #222; border-radius: 10px; padding: 12px 14px; min-width: 150px; border: 2px solid transparent; cursor: pointer; }
    .user-card.selected { border-color: #4a90d9; }
    .user-card .nick { font-size: 15px; font-weight: 700; color: #4a90d9; }
    .user-card .uid { font-size: 10px; color: #555; font-family: monospace; }

    /* 상품 배지 */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .badge-link { background: rgba(74,144,217,.2); color: #4a90d9; }
    .badge-nolink { background: rgba(100,100,100,.2); color: #888; }

    /* 피드 카드 */
    .post-card { background: #222; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .post-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .post-author { font-size: 12px; font-weight: 700; color: #4a90d9; }
    .post-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .post-body { font-size: 13px; color: #aaa; margin-bottom: 10px; }

    /* 상품 섹션 */
    .product-box { background: #1a1a1a; border-radius: 10px; padding: 12px 14px; margin-top: 10px; border-left: 3px solid #4a90d9; }
    .product-box .product-label { font-size: 10px; font-weight: 700; color: #4a90d9; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .product-box .product-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .product-box .product-price { font-size: 13px; color: #f0c040; margin-bottom: 6px; }
    .product-box .product-link { font-size: 12px; color: #4a90d9; word-break: break-all; text-decoration: none; }
    .product-box .product-link:hover { text-decoration: underline; }
    .no-product { color: #555; font-size: 12px; font-style: italic; margin-top: 8px; }
    .empty { color: #555; font-size: 13px; text-align: center; padding: 24px; }

    .divider { height: 1px; background: #2a2a2a; margin: 10px 0; }
    .item-chip { display: inline-block; background: #222; border: 1px solid #333; border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; margin: 4px 4px 4px 0; }
    .item-chip.selected-item { border-color: #4a90d9; color: #4a90d9; }
  </style>
</head>
<body>

<h1>피드 게시글 상품 섹션 테스트</h1>
<p class="subtitle">product { name, price, link } · linkAvailable</p>

<!-- ① 유저 -->
<div class="section">
  <h2>① 테스트 유저</h2>
  <div class="users" id="userList"><div class="empty" style="width:100%">유저를 생성하세요.</div></div>
  <div style="margin-top:12px">
    <button class="btn btn-primary" onclick="createUser()">+ 유저 생성</button>
  </div>
</div>

<!-- ② 상품(SavedItem) 생성 -->
<div class="section">
  <h2>② 상품(SavedItem) 생성</h2>
  <p style="font-size:12px;color:#666;margin-bottom:10px">게시글에 연결할 상품을 만듭니다. 링크가 있으면 linkAvailable=true 가 됩니다.</p>
  <div class="row">
    <label>상품명</label>
    <input id="itemName" value="에어팟 프로 4세대">
  </div>
  <div class="row">
    <label>가격</label>
    <input id="itemPrice" type="number" value="350000">
  </div>
  <div class="row">
    <label>링크 (선택)</label>
    <input id="itemLink" placeholder="https://...  비워두면 linkAvailable=false">
  </div>
  <button class="btn btn-success" onclick="createItem()">상품 생성</button>
  <div id="itemLog" class="log"></div>
  <div id="itemList" style="margin-top:10px"></div>
</div>

<!-- ③ 게시글 작성 -->
<div class="section">
  <h2>③ 게시글 작성</h2>
  <p style="font-size:12px;color:#666;margin-bottom:10px">상품 없이 작성 → product=null / 상품 선택 후 작성 → product 섹션 포함</p>
  <div class="row">
    <label>제목</label>
    <input id="postTitle" value="오늘 드디어 샀어요">
  </div>
  <div class="row">
    <label>본문</label>
    <input id="postBody" value="고민 끝에 결정했습니다.">
  </div>
  <div style="margin-bottom:10px;font-size:12px;color:#888">연결할 상품 (선택): <span id="selectedItemLabel">없음</span></div>
  <button class="btn btn-success" onclick="createPost()">게시글 작성</button>
  <button class="btn btn-outline" style="margin-left:6px" onclick="clearSelectedItem()">상품 연결 해제</button>
  <div id="postLog" class="log"></div>
</div>

<!-- ④ 피드 -->
<div class="section">
  <h2>④ 피드 조회</h2>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn btn-outline btn-sm" onclick="loadFeed()">새로고침</button>
  </div>
  <div id="feedArea"><div class="empty">게시글을 작성하고 새로고침하세요.</div></div>
</div>

<script>
const users = [];
const items = [];   // {itemId, name, price, link}
let selectedIdx = null;
let selectedItemId = null;

// ── 공통 ──────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}
async function api(method, path, body, userId) {
  const headers = { 'Content-Type': 'application/json' };
  if (userId) headers['X-User-Id'] = userId;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = text; }
  return { ok: res.ok, status: res.status, data };
}
function log(id, msg, err) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'log' + (err ? ' err' : '');
}

// ── ① 유저 ──────────────────────────────────────────
async function createUser() {
  const r = await api('POST', '/api/dev/users/test');
  if (!r.ok) { alert('유저 생성 실패: ' + JSON.stringify(r.data)); return; }
  users.push({ userId: r.data.userId, nickname: r.data.nickname });
  selectedIdx = users.length - 1;
  renderUsers();
}
function selectUser(i) { selectedIdx = i; renderUsers(); }
function renderUsers() {
  const el = document.getElementById('userList');
  if (!users.length) { el.innerHTML = '<div class="empty" style="width:100%">유저를 생성하세요.</div>'; return; }
  el.innerHTML = users.map((u, i) => `
    <div class="user-card ${i === selectedIdx ? 'selected' : ''}" onclick="selectUser(${i})">
      <div class="nick">${esc(u.nickname)}</div>
      <div class="uid">${u.userId.slice(0,8)}...</div>
    </div>
  `).join('');
}

// ── ② 상품 생성 ───────────────────────────────────────
async function createItem() {
  if (selectedIdx === null) { alert('유저를 선택하세요.'); return; }
  const userId = users[selectedIdx].userId;
  const name  = document.getElementById('itemName').value.trim() || '테스트 상품';
  const price = parseInt(document.getElementById('itemPrice').value) || 0;
  const link  = document.getElementById('itemLink').value.trim() || null;

  // DevController의 wishes/test 는 상품명/링크를 고정값으로 만들어주므로
  // 직접 dev 엔드포인트로 원하는 값을 삽입합니다
  const r = await api('POST', '/api/dev/items/test', { name, price, link }, userId);
  if (!r.ok) {
    log('itemLog', '실패: ' + JSON.stringify(r.data), true);
    return;
  }
  const itemId = r.data.itemId;
  items.push({ itemId, name, price, link });
  log('itemLog', `상품 생성 완료 ✓\nitemId: ${itemId}\nlinkAvailable: ${!!link}`);
  renderItemList();
}

function renderItemList() {
  const el = document.getElementById('itemList');
  if (!items.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div style="font-size:12px;color:#888;margin-bottom:6px">생성된 상품 (클릭하면 게시글에 연결):</div>' +
    items.map((it, i) => `
      <span class="item-chip ${selectedItemId === it.itemId ? 'selected-item' : ''}"
            onclick="selectItem('${it.itemId}', '${esc(it.name)}')">
        ${esc(it.name)} ${it.price.toLocaleString()}원${it.link ? ' 🔗' : ''}
      </span>
    `).join('');
}

function selectItem(itemId, name) {
  selectedItemId = itemId;
  document.getElementById('selectedItemLabel').textContent = name;
  renderItemList();
}
function clearSelectedItem() {
  selectedItemId = null;
  document.getElementById('selectedItemLabel').textContent = '없음';
  renderItemList();
}

// ── ③ 게시글 작성 ─────────────────────────────────────
async function createPost() {
  if (selectedIdx === null) { alert('유저를 선택하세요.'); return; }
  const userId = users[selectedIdx].userId;
  const title  = document.getElementById('postTitle').value.trim() || '테스트 게시글';
  const body   = document.getElementById('postBody').value.trim() || null;

  const payload = { title, body };
  if (selectedItemId) payload.itemId = selectedItemId;

  const r = await api('POST', '/api/v1/social/posts', payload, userId);
  if (!r.ok) { log('postLog', '실패: ' + JSON.stringify(r.data), true); return; }

  const p = r.data;
  const productStr = p.product
    ? `product.name="${p.product.name}"  price=${p.product.price}  link=${p.product.link || '없음'}\nlinkAvailable=${p.linkAvailable}`
    : 'product=null  linkAvailable=false';
  log('postLog', `작성 완료 ✓  postId: ${p.id}\n${productStr}`);
  await loadFeed();
}

// ── ④ 피드 ────────────────────────────────────────────
async function loadFeed() {
  const userId = selectedIdx !== null ? users[selectedIdx].userId : null;
  const r = await api('GET', '/api/v1/social/posts', null, userId);
  if (!r.ok) {
    document.getElementById('feedArea').innerHTML = `<div class="empty" style="color:#e74c3c">피드 로드 실패: ${JSON.stringify(r.data)}</div>`;
    return;
  }

  const posts = r.data.posts || [];
  if (!posts.length) {
    document.getElementById('feedArea').innerHTML = '<div class="empty">게시글이 없습니다.</div>';
    return;
  }

  document.getElementById('feedArea').innerHTML = posts.map(p => {
    let productHtml = '';
    if (p.product) {
      const linkHtml = p.linkAvailable
        ? `<a class="product-link" href="${esc(p.product.link)}" target="_blank">🔗 ${esc(p.product.link)}</a>`
        : `<span style="color:#555;font-size:12px">링크 없음</span>`;
      productHtml = `
        <div class="product-box">
          <div class="product-label">🛍 상품 정보</div>
          <div class="product-name">${esc(p.product.name)}</div>
          ${p.product.price != null ? `<div class="product-price">${p.product.price.toLocaleString()}원</div>` : ''}
          ${linkHtml}
        </div>`;
    } else {
      productHtml = `<div class="no-product">상품 섹션 없음 (product: null)</div>`;
    }

    return `
      <div class="post-card">
        <div class="post-header">
          <span class="post-author">${esc(p.authorNickname)}</span>
          <span class="badge ${p.linkAvailable ? 'badge-link' : 'badge-nolink'}">
            linkAvailable: ${p.linkAvailable}
          </span>
        </div>
        <div class="post-title">${esc(p.title)}</div>
        ${p.body ? `<div class="post-body">${esc(p.body)}</div>` : ''}
        ${productHtml}
      </div>`;
  }).join('');
}
</script>
</body>
</html>
