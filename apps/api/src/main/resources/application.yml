spring:
  application:
    name: 404-action-deck-api
  config:
    import:
      - optional:file:.env.properties
      - optional:file:../../.env.properties
  datasource:
    url: ${DB_URL:jdbc:h2:mem:404;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  ai:
    ollama:
      enabled: ${OLLAMA_ENABLED:true}
      background-enhancement-enabled: ${OLLAMA_BACKGROUND_ENHANCEMENT_ENABLED:true}
      model: ${OLLAMA_MODEL:qwen3:4b}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      executable-path: ${OLLAMA_EXECUTABLE_PATH:}
      timeout-seconds: ${OLLAMA_TIMEOUT_SECONDS:120}
      max-output-tokens: ${OLLAMA_MAX_OUTPUT_TOKENS:320}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  scraping:
    timeout-millis: ${SCRAPING_TIMEOUT_MILLIS:7000}
    user-agent: ${SCRAPING_USER_AGENT:Mozilla/5.0 (compatible; 404ActionDeckBot/1.0; +https://example.com)}
